name: "mofa-fm-api Trending API Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - expect_event:
      event: message_received
      payload:
        content_contains: "bilibili"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "zhihu"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "weibo"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "github"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "weixin"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "douyin"
      timeout: 60
      poll_interval: 1.0
