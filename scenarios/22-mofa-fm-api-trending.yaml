name: "mofa-fm-api Trending API Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - wait_for_test_trigger:
      tc_id: TC-API-22-01
      correlation_id: run-20260330-221
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_api_trending
        args:
          source: "bilibili"
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_api_trending
        status: success
      timeout: 30

