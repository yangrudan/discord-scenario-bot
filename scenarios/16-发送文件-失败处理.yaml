test_case:
  id: send_file_failure_handling
  description: "文件上传失败时，机器人应通知用户并提供重试或备用链接"
  events:
    - event: message_received
      author: {id: 1006, name: "tester"}
      channel: "DM"
      content: "合成并发送音频，用 Eric: 失败测试"
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "尝试发送文件..."
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "⚠️ 文件发送失败: CDN 错误。请稍后重试或使用备用链接"
  expected:
    - send_file_attempted: true
    - bot_provides_retry_instruction: true
