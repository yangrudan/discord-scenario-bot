name: "mofa-fm-api Auth API Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - expect_event:
      event: message_received
      payload:
        content_contains: "token"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "user"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "creator"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "podcast"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "script"
      timeout: 60
      poll_interval: 1.0
