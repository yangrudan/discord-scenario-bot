name: "mofa-fm-api Auth API Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - wait_for_test_trigger:
      tc_id: TC-API-21-01
      correlation_id: run-20260330-211
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "token"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-API-21-02
      correlation_id: run-20260330-212
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "user"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-API-21-03
      correlation_id: run-20260330-213
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "creator"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-API-21-04
      correlation_id: run-20260330-214
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "podcast"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-API-21-05
      correlation_id: run-20260330-215
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "script"
      timeout: 60
      poll_interval: 1.0
