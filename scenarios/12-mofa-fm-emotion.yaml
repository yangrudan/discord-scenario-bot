name: "mofa-fm Emotion Control Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - wait_for_test_trigger:
      tc_id: TC-FM-12-01
      correlation_id: run-20260330-121
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "今天天气真好，我感到非常开心！"
          voice: "vivian"
          emotion: "happy"
          language: "chinese"
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30

  - wait_for_test_trigger:
      tc_id: TC-FM-12-02
      correlation_id: run-20260330-122
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "这个消息让我感到非常悲伤。"
          voice: "vivian"
          emotion: "sad"
          language: "chinese"
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30

  - wait_for_test_trigger:
      tc_id: TC-FM-12-03
      correlation_id: run-20260330-123
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "I am so excited about this amazing news!"
          voice: "serena"
          emotion: "excited"
          language: "english"
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30

  - wait_for_test_trigger:
      tc_id: TC-FM-12-04
      correlation_id: run-20260330-124
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "Please stay calm and listen carefully."
          voice: "ryan"
          emotion: "calm"
          language: "english"
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30
