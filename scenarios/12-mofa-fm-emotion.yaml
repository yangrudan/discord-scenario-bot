name: "mofa-fm Emotion Control Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - wait_for_test_trigger:
      tc_id: TC-FM-12-01
      correlation_id: run-20260330-121
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "happy"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-FM-12-02
      correlation_id: run-20260330-122
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "sad"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-FM-12-03
      correlation_id: run-20260330-123
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "excited"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-FM-12-04
