name: "mofa-fm Emotion Control Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - expect_event:
      event: message_received
      payload:
        content_contains: "happy"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "sad"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "excited"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "calm"
      timeout: 60
      poll_interval: 1.0
