test_case:
  id: rename_audio
  description: "重命名音频文件后，旧名不可用，新名可用"
  events:
    - event: message_received
      author: {id: 2001, name: "owner"}
      channel: "DM"
      content: "重命名音频 demo_old -> demo_new"
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "已将 demo_old 重命名为 demo_new"
  expected:
    - new_name_search_returns: true
    - old_name_search_returns: false
