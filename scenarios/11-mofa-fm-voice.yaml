name: "mofa-fm Voice Management Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - wait_for_test_trigger:
      tc_id: TC-FM-11-01
      correlation_id: run-20260330-111
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "voice"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-FM-11-02
      correlation_id: run-20260330-112
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "saved"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-FM-11-03
      correlation_id: run-20260330-113
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "custom"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
      tc_id: TC-FM-11-04
