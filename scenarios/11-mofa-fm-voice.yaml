name: "mofa-fm Voice Management Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - expect_event:
      event: message_received
      payload:
        content_contains: "voice"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "saved"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "custom"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "deleted"
      timeout: 60
      poll_interval: 1.0
