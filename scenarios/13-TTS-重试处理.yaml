test_case:
  id: tts_retry_on_transient_failure
  description: "TTS 服务暂时失败时，机器人重试 N 次后成功或最终报错"
  events:
    - event: message_received
      author: {id: 1004, name: "tester"}
      channel: "DM"
      content: "用 Eric 合成: 这是一次重试测试"
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "✓ `fm_tts` (attempt 1 failed, retrying)"
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "✓ `fm_tts` (attempt 2 succeeded)"
  expected:
    - retry_attempts: 2
    - final_state: "succeeded"
