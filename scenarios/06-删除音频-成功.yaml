test_case:
  id: delete_audio_success
  description: "具有权限的用户删除存在的音频文件，机器人确认删除并从列表移除"
  events:
    - event: message_received
      author: {id: 2001, name: "owner"}
      channel: "DM"
      content: "删除音频 demo_track_01"
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "✓ `delete_audio`"
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "已删除音频: demo_track_01"
  expected:
    - delete_api_called: true
    - final_message_contains: "已删除音频"
