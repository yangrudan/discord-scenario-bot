name: "mofa-fm TTS Basic Function Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - wait_for_test_trigger:
      tc_id: TC-FM-10-01
      correlation_id: run-20260330-101
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "Hello, this is a basic TTS test."
          voice: "vivian"
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30

  - wait_for_test_trigger:
      tc_id: TC-FM-10-02
      correlation_id: run-20260330-102
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "Testing serena voice preset."
          voice: "serena"
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30

  - wait_for_test_trigger:
      tc_id: TC-FM-10-03
      correlation_id: run-20260330-103
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "Testing ryan voice preset."
          voice: "ryan"
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30

  - wait_for_test_trigger:
      tc_id: TC-FM-10-04
      correlation_id: run-20260330-104
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "Testing slow speech rate."
          voice: "vivian"
          speed: 0.5
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30

  - wait_for_test_trigger:
      tc_id: TC-FM-10-05
      correlation_id: run-20260330-105
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: tool_call
      payload:
        tool: fm_tts
        args:
          text: "Testing fast speech rate."
          voice: "vivian"
          speed: 2.0
      timeout: 30

  - expect_event:
      event: tool_result
      payload:
        tool: fm_tts
        status: success
      timeout: 30
