name: "mofa-fm TTS Basic Function Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - expect_event:
      event: message_received
      payload:
        content_contains: "vivian"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "serena"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "ryan"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "0.5"
      timeout: 60
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "2.0"
      timeout: 60
      poll_interval: 1.0
