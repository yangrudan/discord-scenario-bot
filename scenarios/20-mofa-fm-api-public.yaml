name: "mofa-fm-api Public API Test"
defaults:
  settle_timeout: 5
  max_wait: 60

steps:
  - wait_for_test_trigger:
      tc_id: TC-API-20-01
      correlation_id: run-20260330-201
      timeout: 30
      poll_interval: 1.0

  - expect_event:
      event: message_received
      payload:
        content_contains: "mofa.fm"
      timeout: 60
      poll_interval: 1.0

  - wait_for_test_trigger:
