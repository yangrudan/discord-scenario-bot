name: "fm-api 创建节目 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        content: "创建节目的标题: 测试节目 描述: 这是一个测试"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["创建成功", "201", "slug"]
      timeout: 5
      poll_interval: 1.0
