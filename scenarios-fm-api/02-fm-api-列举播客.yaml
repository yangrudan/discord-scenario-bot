name: "fm-api 列举播客 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        content: "列出我的音频"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["音频列表", "共", "页"]
      timeout: 5
      poll_interval: 1.0
