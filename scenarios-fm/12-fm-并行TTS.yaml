name: "并发 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        content_contains_regex: "生成一个100字的音频，内容任意"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["音频已生成","音频已生成"]
      timeout: 5
      poll_interval: 1.0