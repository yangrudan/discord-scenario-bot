name: "音频时长 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        # 去掉末尾多余空格，允许可选尾随空白
        content_contains_regex: "可以生成不被分割的音频最长的时长\\s*"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        # 匹配类似 "200-300 字"、"200-300字"、"200 字" 等形式
        after_contains_regex: "200\\s*-?\\s*300\\s*字|200\\s*字"
      timeout: 5
      poll_interval: 1.0