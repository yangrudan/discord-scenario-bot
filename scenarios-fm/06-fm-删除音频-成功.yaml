name: "删除音频 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        # 更宽松的正则：允许可选的空格、可选的反引号和可选的相对路径前缀 (~/)；不再要求尾随空格
        content_contains_regex: "删除\\s*`?~?/?\\S*\\.wav`?"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["确认删除"]
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["已删除"]
      timeout: 5
      poll_interval: 1.0