name: "重命名音频 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        content_contains_regex: "重命名\\s*\\S*\\.wav"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["已重命名"]
      timeout: 5
      poll_interval: 1.0
