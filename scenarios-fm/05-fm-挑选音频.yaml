name: "挑选音频 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        # 匹配 '给我douwt_test.wav' 或 '给我 douwt.wav'：允许可选空格与任意非空白文件名，\.wav 需转义
        content_contains_regex: "给我\\s*\\S*\\.wav"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["已发送", "Discord"]
      timeout: 5
      poll_interval: 1.0