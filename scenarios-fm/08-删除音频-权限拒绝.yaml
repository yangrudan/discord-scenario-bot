name: "音频时长 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        content_contains_regex: "可以生成不被分割的音频最长的时长 "
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["200字"]
      timeout: 5
      poll_interval: 1.0