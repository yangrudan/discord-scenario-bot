test_case:
  id: bulk_delete_audios
  description: "批量删除多个音频文件，全部删除成功或部分失败需报告"
  events:
    - event: message_received
      author: {id: 2001, name: "owner"}
      channel: "DM"
      content: "批量删除音频: track1,track2,track3"
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "开始批量删除 3 个音频..."
    - event: message_edit
      author: {id: 3001, name: "agent"}
      after: "已删除: track1, track2。失败: track3 (未找到)"
  expected:
    - deleted_count: 2
    - failed_items: ["track3"]
