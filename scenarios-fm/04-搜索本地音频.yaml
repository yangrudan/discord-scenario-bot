name: "查找本地语音 Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        # 使用正则以容错有无逗号或空格：匹配 "你好，2026"、"你好 2026"、"你好,2026" 等
        content_contains_regex: "看看已经生成的语音"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["文件名", "wav"]
      timeout: 5
      poll_interval: 1.0