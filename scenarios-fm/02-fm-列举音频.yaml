name: "fm_list_audios Test"
defaults:
  settle_timeout: 5
  max_wait: 5

steps:
  - expect_event:
      event: message_received
      payload:
        content: "列举可用音色"
      timeout: 5
      poll_interval: 1.0
  - expect_event:
      event: message_edit
      payload:
        after_contains: ["音色", "eric", "sohee"]
      timeout: 5
      poll_interval: 1.0
